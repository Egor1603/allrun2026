<script>
  (function(){
    // Автоматическое переключение по времени суток
    // 7:00–19:00 → дневная, остальное → вечерняя
    // Ручной override сохраняется в localStorage на 1 час
    var override = localStorage.getItem('allrunrus-theme-override');
    var overrideTime = parseInt(localStorage.getItem('allrunrus-theme-time')||'0');
    var now = Date.now();
    var theme;
    if (override && (now - overrideTime) < 3600000) {
      theme = override;
    } else {
      var h = new Date().getHours();
      theme = (h >= 7 && h < 19) ? 'day' : 'night';
    }
    document.documentElement.setAttribute('data-theme', theme);
  })();

<script>
(function() {
  var h = new Date().getHours();
  var auto = (h >= 7 && h < 19) ? 'day' : 'night';
  var override = localStorage.getItem('allrunrus-theme-override');
  var overrideTime = parseInt(localStorage.getItem('allrunrus-theme-time')||'0');
  var theme = (override && (Date.now()-overrideTime) < 3600000) ? override : auto;
  document.documentElement.setAttribute('data-theme', theme);
  var btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = theme === 'night' ? '☀️' : '🌙';
})();
window.toggleTheme = function() {
  var current = document.documentElement.getAttribute('data-theme') || 'night';
  var next = current === 'night' ? 'day' : 'night';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('allrunrus-theme-override', next);
  localStorage.setItem('allrunrus-theme-time', Date.now().toString());
  var btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = next === 'night' ? '☀️' : '🌙';
};
</script>

<script>
(function () {
  'use strict';
  var allClinics = [];
  var selectedCity = '';
  var cityKbdIdx = -1;

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function plural(n, one, few, many) { var m10=n%10,m100=n%100; if(m10===1&&m100!==11) return one; if(m10>=2&&m10<=4&&(m100<10||m100>=20)) return few; return many; }

  function render() {
    var mainEl=document.getElementById('main'), statsEl=document.getElementById('stats-text');
    var filtered = selectedCity ? allClinics.filter(function(c){return c.city===selectedCity;}) : allClinics;
    statsEl.textContent = 'Найдено: '+filtered.length+' '+plural(filtered.length,'клиника','клиники','клиник');
    if (!filtered.length) { mainEl.innerHTML='<div class="state-box"><div class="state-icon">&#128269;</div>Клиник не найдено.</div>'; return; }
    var byCity={}, cityOrder=[];
    filtered.forEach(function(c){ if(!byCity[c.city]){byCity[c.city]=[];cityOrder.push(c.city);} byCity[c.city].push(c); });
    var html = '<div class="info-banner"><strong>Справка по приказу Минздрава № 1444н</strong> — официальный допуск к участию в спортивных соревнованиях. Для забегов до 10 км: осмотр терапевта + ЭКГ. Для марафонов и трейлов: ЭКГ с нагрузкой. Срок действия — 6 месяцев.</div>';
    cityOrder.forEach(function(city){
      var cl=byCity[city];
      html+='<div class="month-section"><div class="month-heading"><span class="month-heading-text">'+esc(city)+'</span><div class="month-heading-line"></div><span class="month-heading-count">'+cl.length+' '+plural(cl.length,'клиника','клиники','клиник')+'</span></div><div class="clinics-grid">';
      cl.forEach(function(c){
        html+='<div class="clinic-card"><div class="clinic-name">'+esc(c.name)+'</div><div class="clinic-info">';
        html+='<div class="clinic-info-row"><svg class="clinic-info-icon" viewBox="0 0 14 14" fill="none"><path d="M7 1C5.34 1 4 2.34 4 4C4 6.5 7 13 7 13S10 6.5 10 4C10 2.34 8.66 1 7 1zm0 4a1 1 0 110-2 1 1 0 010 2z" fill="currentColor"/></svg>';
        html+=(c.address?'<span>'+esc(c.address)+'</span>':'<span class="no-address">Адрес на сайте клиники</span>')+'</div>';
        if(c.phone) html+='<div class="clinic-info-row"><svg class="clinic-info-icon" viewBox="0 0 14 14" fill="none"><path d="M2 2h3l1.5 3-1.5 1.5a9 9 0 004 4L10.5 9l3 1.5V14a1 1 0 01-1 1C6 15-1 8-1 1a1 1 0 011-1z" stroke="currentColor" stroke-width="1.2" fill="none"/></svg><span>'+esc(c.phone)+'</span></div>';
        html+='</div><a class="clinic-btn" href="'+esc(c.url)+'" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M6 2H2a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1V8M9 1h4m0 0v4m0-4L6 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>Сайт клиники</a></div>';
      });
      html+='</div></div>';
    });
    mainEl.innerHTML=html;
  }

  function getCities() { var seen={},order=[]; allClinics.forEach(function(c){if(!seen[c.city]){seen[c.city]=0;order.push(c.city);}seen[c.city]++;}); return order.map(function(city){return{city:city,count:seen[city]};}); }
  function buildDropdown(query) {
    var dd=document.getElementById('city-dropdown'); if(!dd) return;
    var cities=getCities(), nq=query.toLowerCase().replace(/ё/g,'е').trim();
    var matched=nq?cities.filter(function(c){return c.city.toLowerCase().replace(/ё/g,'е').indexOf(nq)!==-1;}):cities;
    if(!matched.length){dd.classList.remove('open');return;}
    var safe=query.replace(/[-\/\^$*+?.()|[\]{}]/g,'\$&');
    dd.innerHTML=matched.map(function(c,i){
      var nameHtml=esc(c.city).replace(new RegExp('('+safe+')','i'),'<mark>$1</mark>');
      return '<div class="city-opt" data-city="'+esc(c.city)+'" data-idx="'+i+'"><span style="font-size:14px;flex-shrink:0">&#128205;</span><span class="city-opt-name">'+nameHtml+'</span><span class="city-opt-count">'+c.count+'</span></div>';
    }).join('');
    dd.classList.add('open');
    dd.querySelectorAll('.city-opt').forEach(function(el){el.addEventListener('mousedown',function(e){e.preventDefault();selectCity(el.getAttribute('data-city'));});});
  }
  function selectCity(city){selectedCity=city;var inp=document.getElementById('city-input'),btn=document.getElementById('city-clear');if(inp)inp.value=city;if(btn)btn.style.display=city?'block':'none';closeDropdown();render();}
  function closeDropdown(){var dd=document.getElementById('city-dropdown');if(dd)dd.classList.remove('open');cityKbdIdx=-1;}
  window.onCityInput=function(){var inp=document.getElementById('city-input'),btn=document.getElementById('city-clear'),val=inp?inp.value.trim():'';if(btn)btn.style.display=val?'block':'none';selectedCity='';buildDropdown(val);render();};
  window.clearCity=function(){var inp=document.getElementById('city-input'),btn=document.getElementById('city-clear');selectedCity='';if(inp){inp.value='';inp.focus();}if(btn)btn.style.display='none';closeDropdown();render();};
  document.addEventListener('keydown',function(e){var dd=document.getElementById('city-dropdown');if(!dd||!dd.classList.contains('open'))return;var opts=dd.querySelectorAll('.city-opt');if(!opts.length)return;if(e.key==='ArrowDown'){e.preventDefault();cityKbdIdx=Math.min(cityKbdIdx+1,opts.length-1);opts.forEach(function(o,i){o.classList.toggle('kbd-active',i===cityKbdIdx);});}else if(e.key==='ArrowUp'){e.preventDefault();cityKbdIdx=Math.max(cityKbdIdx-1,0);opts.forEach(function(o,i){o.classList.toggle('kbd-active',i===cityKbdIdx);});}else if(e.key==='Enter'&&cityKbdIdx>=0){e.preventDefault();selectCity(opts[cityKbdIdx].getAttribute('data-city'));}else if(e.key==='Escape')closeDropdown();});
  document.addEventListener('click',function(e){var wrap=document.getElementById('city-wrap');if(wrap&&!wrap.contains(e.target))closeDropdown();});
  document.getElementById('city-input').addEventListener('focus',function(){buildDropdown(this.value.trim());});
  document.getElementById('city-input').addEventListener('blur',function(){setTimeout(closeDropdown,160);});

  fetch('https://allrunrus.ru/clinics.json?_='+Date.now())
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(data){allClinics=data.clinics||[];render();})
    .catch(function(){document.getElementById('main').innerHTML='<div class="state-box"><div class="state-icon">&#9888;</div>Не удалось загрузить данные.</div>';document.getElementById('stats-text').textContent='';});
}());
</script>
</body>
</html>
